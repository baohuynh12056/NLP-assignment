  gpu_layers: -1
  temperature: 0.3
  max_tokens: 1024
  chat_format: "chatml"

reranker:
  type: "cross_encoder"
  model_path: "BAAI/bge-reranker-base"
  max_length: 512
  device: null
  top_k: 5
