# configs/models.yaml

# 1. Micro LLM specialized in JSON parsing (Temperature 0.0 for deterministic output)
parser:
  type: "llama_cpp"
  model_path: "models/qwen-micro-parser.gguf"  # Update this to your actual file path
  context_window: 512
  temperature: 0.0
  max_tokens: 100
  chat_format: "qwen"

# 2. Main LLM for answer generation
generator:
  type: "llama_cpp"
  model_path: "models/qwen-generator.gguf"    # Update this to your actual file path
  context_window: 4096
  temperature: 0.3
  max_tokens: 800
  chat_format: "qwen"

# 3. Hybrid Retriever configuration
retriever:
  type: "pg_hybrid"
  embed_model_path: "BAAI/bge-small-en-v1.5"
  weights:
    semantic: 0.7
    keyword: 0.3

# 4. Cross-Encoder Reranker configuration
reranker:
  type: "cross_encoder"
  model_path: "BAAI/bge-reranker-base"       # Can be upgraded to 'bge-reranker-large'
  max_length: 512
  top_k: 5