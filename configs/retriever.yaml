# configs/retriever.yaml

type: "faiss_local"
embed_model_path: "BAAI/bge-small-en-v1.5" # Lightweight model for fast embedding
retrieval_k: 12
context_k: 4
index_path: "models/faiss/functions.index"
metadata_path: "models/faiss/functions_metadata.jsonl"
score_threshold: -1.0
fetch_multiplier: 4
fast_mode_rerank: false
weights:
  semantic: 0.7  # Priority given to vector search
  keyword: 0.3   # FTS acts as a precise keyword booster

database:
  dbname: "rag_database"
  user: "admin"
  password: "secretpassword"
  host: "localhost"
  port: 5432
