services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nlp_assignment_postgres
    environment:
      POSTGRES_DB: rag_database
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../src/database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d rag_database"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
