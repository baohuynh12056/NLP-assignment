services:
  # 1. PostgreSQL + pgvector
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_database
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: rag_database
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Web API Backend
  web:
    build: .
    container_name: rag_web_api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./models:/app/models
    # GPU (Docker Compose v2 + NVIDIA)
    gpus: all

  # 3. Data Injector (Tự động nạp dữ liệu)
  injector:
    build: .
    container_name: rag_data_injector
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: bash -c "PYTHONPATH=./src python src/data_pipeline/db_injector.py"

volumes:
  pgdata: